<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>psyneulink-ui</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">psyneulink-ui</div>
    <div class="topbar-right">
      <span class="backend-label" id="backend-label" title="LLM backend in use (set by env / auto-detect on the server)">backend: …</span>
      <span class="status" id="status">connecting…</span>
    </div>
  </header>

  <main class="layout">
    <section class="pane chat-pane">
      <div class="scrollback" id="scrollback" aria-live="polite"></div>

      <aside class="dock">
        <h3>Resources</h3>
        <ul class="resources" id="resources"></ul>
        <div class="dock-actions">
          <label class="upload-btn">
            <input type="file" id="upload-pdf" accept="application/pdf,.pdf" hidden />
            Upload PDF
          </label>
          <label class="upload-btn">
            <input
              type="file"
              id="upload-data"
              accept=".csv,.parquet,.jsonl,.tsv,text/csv"
              hidden
            />
            Upload Data
          </label>
          <label class="upload-btn">
            <input type="file" id="upload-model" accept=".py" hidden />
            Upload Model (.py)
          </label>
          <button type="button" id="save-model-btn" class="dock-btn">
            Save model as .py…
          </button>
        </div>
      </aside>

      <form class="composer" id="composer" autocomplete="off">
        <textarea
          id="composer-input"
          rows="3"
          placeholder="Describe a model, ask a question, or request a tool call…"
        ></textarea>
        <div class="composer-actions">
          <button
            type="button"
            id="composer-stop"
            class="stop-btn"
            hidden
            title="Stop the agent (cancels the current turn)"
          >
            Stop
          </button>
          <button type="submit" id="composer-send" class="primary">Send</button>
        </div>
      </form>
    </section>

    <section class="pane right-pane">
      <div class="right-tabs" role="tablist">
        <button
          type="button"
          class="right-tab active"
          id="tab-graph"
          role="tab"
          aria-selected="true"
        >
          Graph
        </button>
        <button
          type="button"
          class="right-tab"
          id="tab-code"
          role="tab"
          aria-selected="false"
        >
          Code
        </button>
      </div>

      <div class="right-tab-panel" id="panel-graph" role="tabpanel">
        <div class="graph-header">
          <div>
            <div class="graph-title">Composition graph</div>
            <div class="graph-meta" id="graph-meta">no composition yet</div>
          </div>
          <div class="graph-controls">
            <label>
              format
              <select id="graph-format">
                <option value="png" selected>png</option>
                <option value="svg">svg</option>
              </select>
            </label>
            <button type="button" id="graph-refresh" class="dock-btn">refresh</button>
          </div>
        </div>
        <div class="graph-body">
          <img id="graph-img" alt="composition graph" />
          <div class="graph-empty" id="graph-empty">
            Build or load a composition to see it rendered here.
          </div>
        </div>
      </div>

      <div class="right-tab-panel" id="panel-code" role="tabpanel" hidden>
        <div class="code-header">
          <div>
            <div class="code-title">Composition as Python</div>
            <div class="code-meta" id="code-meta">no composition yet</div>
          </div>
          <div class="code-controls">
            <button type="button" id="code-refresh" class="dock-btn">refresh</button>
          </div>
        </div>
        <div class="code-body">
          <pre class="code-pre"><code id="code-text"></code></pre>
          <div class="code-empty" id="code-empty">
            Build or load a composition to see its Python source here.
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
